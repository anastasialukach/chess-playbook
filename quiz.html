<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blunder Quiz — Chess Playbook</title>
<link rel="stylesheet" href="shared.css">
<style>
.quiz-ctx{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#555;margin-bottom:8px;letter-spacing:0.5px;}
.quiz-ctx .quiz-color{font-weight:700;color:#1a1a1a;}
.quiz-prompt{font-size:18px;font-weight:700;margin-bottom:16px;line-height:1.3;}
.quiz-moves{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#555;margin-bottom:12px;background:#f8f7f0;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;}
.answer-grid{display:flex;flex-direction:column;gap:8px;margin:20px 0;}
.answer-btn{display:block;width:100%;text-align:left;padding:14px 18px;background:#fff;border:2px solid #e0e0e0;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s;color:#1a1a1a;}
.answer-btn:hover:not(.locked){border-color:#769656;background:#f8f7f0;}
.answer-btn.locked{cursor:default;}
.answer-btn.correct{background:#dcffe4;border-color:#22863a;color:#22863a;}
.answer-btn.wrong{background:#ffe3e6;border-color:#d73a49;color:#d73a49;}
.answer-btn .move-label{font-size:13px;font-weight:400;color:#555;margin-left:8px;}
.next-btn{display:inline-block;margin-top:16px;background:#1a1a1a;color:#fff;border:none;padding:12px 28px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;}
.next-btn:hover{background:#333;}
.result-verdict{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;margin-bottom:6px;letter-spacing:0.5px;}
.result-verdict.grn{color:#22863a;}
.result-verdict.rd{color:#d73a49;}
.end-screen{text-align:center;padding:40px 0;}
.end-score{font-family:'IBM Plex Mono',monospace;font-size:64px;font-weight:700;color:#1a1a1a;line-height:1;}
.end-denom{font-family:'IBM Plex Mono',monospace;font-size:24px;color:#555;margin-bottom:8px;}
.end-msg{font-size:20px;font-weight:700;margin:12px 0 24px;color:#1a1a1a;}
.hidden{display:none;}

/* Mobile fixes */
@media(max-width:480px){
  .quiz-prompt{font-size:16px;}
  .quiz-moves{font-size:12px;padding:8px 12px;}
  .answer-btn{padding:12px 14px;font-size:14px;min-height:44px;}
  .answer-btn .move-label{font-size:11px;}
  .next-btn{padding:10px 22px;font-size:13px;min-height:44px;}
  .end-score{font-size:48px;}
  .end-denom{font-size:20px;}
  .end-msg{font-size:17px;}
  #quiz-board{max-width:100%;}
}
</style>
<link rel="stylesheet" href="gamification.css">
</head>
<body>
<nav class="site-nav" id="site-nav"></nav>
<script src="shared.js"></script>
<script>renderNav("quiz")</script>
<div class="wrap">

<div class="stage-hdr">
  <div class="stage-num">Interactive</div>
  <h1>Blunder Quiz</h1>
  <div class="stage-meta">Learn from your mistakes — 6 positions from your games</div>
</div>

<!-- Score bar -->
<div class="stats" id="score-bar">
  <div class="stat"><div class="label">Position</div><div class="val" id="pos-num">1/6</div></div>
  <div class="stat"><div class="label">Score</div><div class="val grn" id="score-val">0/6</div></div>
</div>

<!-- Quiz area -->
<div id="quiz-area">
  <div class="quiz-ctx" id="quiz-ctx"></div>
  <div class="quiz-moves" id="quiz-moves"></div>
  <div class="quiz-prompt" id="quiz-prompt"></div>
  <div class="bwrap"><div id="quiz-board"></div></div>
  <div class="answer-grid" id="answer-grid"></div>
  <div id="feedback" class="hidden"></div>
  <div id="next-wrap" class="hidden" style="text-align:center;">
    <button class="next-btn" id="next-btn">Next →</button>
  </div>
</div>

<!-- End screen -->
<div id="end-screen" class="end-screen hidden">
  <div class="end-score" id="end-score"></div>
  <div class="end-denom">out of 6</div>
  <div class="end-msg" id="end-msg"></div>
  <div class="stats" id="end-stats"></div>
  <button class="next-btn" id="retry-btn" style="margin-top:12px;">Try Again</button>
  <div class="cta-card" style="margin-top:28px;">
    <h3>Keep Improving</h3>
    <p>Review the patterns behind these blunders.</p>
    <a href="ch-patterns.html">Pattern Recognition →</a>
  </div>
</div>

</div>

<script>
(function(){

var quizzes = [
  {
    id: 'g11-f2',
    game: 'G11',
    ctx: 'White vs opponent — Italian-style opening',
    movesText: '1.e4 e5 2.Nf3 Bc5 — opponent\'s bishop aims at f2',
    color: 'WHITE',
    flip: false,
    board: function(){
      return ad(rm(SP, ['e2','g1','e7','f8']), [['wP','e4'],['wN','f3'],['bP','e5'],['bB','c5']]);
    },
    right: 'Bc4',
    wrong: 'Nc3',
    other: 'd3',
    explanation: 'Bc5 aims at f2 — your weakest square. Bc4 fights for the diagonal. Nc3 ignores the threat entirely.'
  },
  {
    id: 'g33-side',
    game: 'G33',
    ctx: 'Black vs opponent — Ruy Lopez territory',
    movesText: '1.e3 e5 2.e4 Nc6 3.Bb5 — opponent\'s bishop pins',
    color: 'BLACK',
    flip: true,
    board: function(){
      return ad(rm(SP, ['e2','e7','b8','f1']), [['wP','e4'],['bP','e5'],['bN','c6'],['wB','b5']]);
    },
    right: 'Nf6',
    wrong: 'a6',
    other: 'd6',
    explanation: 'Don\'t chase bishops with side pawns! Nf6 develops a piece AND attacks e4. a6 wastes a tempo on a non-developing move.'
  },
  {
    id: 'g8-fried',
    game: 'G8',
    ctx: 'Black vs opponent — Fried Liver setup',
    movesText: '1.e4 e5 2.Bc4 Nf6 3.Nc3 Bc5 4.Nf3 — Bc4+Nf3 aimed at f7',
    color: 'BLACK',
    flip: true,
    board: function(){
      return ad(rm(SP, ['e2','f1','b1','g1','e7','g8','f8']), [['wP','e4'],['wB','c4'],['wN','c3'],['wN','f3'],['bP','e5'],['bN','f6'],['bB','c5']]);
    },
    right: 'd5',
    wrong: 'O-O',
    other: 'd6',
    explanation: 'With Bc4 + Nf3 aimed at f7, castling walks into Ng5\u2192Bxf7+! Play d5! immediately — it attacks the bishop and opens your game.'
  },
  {
    id: 'g11-retreat',
    game: 'G11',
    ctx: 'White vs opponent — pawn attacks your knight',
    movesText: '1.e4 e5 2.Nf3 Bc5 3.Nc3 Qf6 4.Bc4 d5 5.exd5 e4 — pawn attacks Nf3',
    color: 'WHITE',
    flip: false,
    board: function(){
      return ad(rm(SP, ['e2','g1','b1','f1','e7','f8','d8','d7','e5']), [['wN','f3'],['wN','c3'],['wB','c4'],['wP','d5'],['bB','c5'],['bQ','f6'],['bP','e4']]);
    },
    right: 'Ng5',
    wrong: 'Ng1',
    other: 'Nd4',
    explanation: 'NEVER retreat a knight to g1 under pressure! Ng5 jumps forward and threatens Nxf7. Ng1 gives up all your development and allows Qxf2#.'
  },
  {
    id: 'g31-qxh7',
    game: 'G31',
    ctx: 'Black vs opponent — queen on h5, bishop on h6',
    movesText: 'Opponent has Qh5 + Bh6 — threatening Qxh7#',
    color: 'BLACK',
    flip: true,
    board: function(){
      return ad(rm(SP, ['d1','c1','e7','g8','e8','h8','g7']), [['wQ','h5'],['wB','h6'],['bN','f6'],['bK','g8'],['bR','f8'],['bP','g7']]);
    },
    right: 'g6',
    wrong: 'e5',
    other: 'h6',
    explanation: 'When the opponent\'s queen reaches h5 and your king is on g8, Qxh7# is the immediate threat! g6 blocks it. e5 ignores a one-move checkmate.'
  },
  {
    id: 'g21-diagonal',
    game: 'G21',
    ctx: 'White — open long diagonal a8-h1',
    movesText: 'Long diagonal a8-h1 is open — opponent\'s queen eyes g2',
    color: 'WHITE',
    flip: false,
    board: function(){
      return [['wR','a1'],['wR','e5'],['wB','e2'],['wK','g1'],['wP','a3'],['wP','c3'],['wP','d4'],['wP','f2'],['wP','g2'],['wP','h2'],['bK','g8'],['bP','a7'],['bP','b6'],['bP','e6'],['bP','f7'],['bP','g7'],['bP','h7'],['bR','a8'],['bB','c8'],['bQ','c6']];
    },
    right: 'Bf1',
    wrong: 'f4',
    other: 'f3',
    explanation: 'The a8-h1 diagonal is dangerous! If opponent plays Bb7, they threaten Qg2#. Bf1 keeps g2 defended. f4 rips open the diagonal and invites disaster.'
  }
];

var current = 0;
var score = 0;
var answered = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function render() {
  var q = quizzes[current];
  document.getElementById('pos-num').textContent = (current + 1) + '/6';
  document.getElementById('score-val').textContent = score + '/6';
  document.getElementById('quiz-ctx').innerHTML = 'Game <span class="quiz-color">' + q.game + '</span> · You were <span class="quiz-color">' + q.color + '</span> · ' + q.ctx;
  document.getElementById('quiz-moves').textContent = q.movesText;
  document.getElementById('quiz-prompt').textContent = 'What should you play?';

  // Render board
  var boardEl = document.getElementById('quiz-board');
  boardEl.innerHTML = '';
  boardEl.id = 'qb-' + q.id;
  var opts = {};
  if (q.flip) opts.flip = true;
  brd('qb-' + q.id, q.board(), opts);

  // Render answer buttons
  var choices = shuffle([
    { move: q.right, isRight: true },
    { move: q.wrong, isRight: false, isBlunder: true },
    { move: q.other, isRight: false, isBlunder: false }
  ]);

  var grid = document.getElementById('answer-grid');
  grid.innerHTML = '';
  answered = false;

  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = c.move;
    btn.setAttribute('data-move', c.move);
    btn.setAttribute('data-right', c.isRight ? '1' : '0');
    btn.setAttribute('data-blunder', c.isBlunder ? '1' : '0');
    btn.addEventListener('click', function(){ pick(this, q); });
    grid.appendChild(btn);
  });

  // Hide feedback and next
  document.getElementById('feedback').className = 'hidden';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-wrap').className = 'hidden';
}

function pick(btn, q) {
  if (answered) return;
  answered = true;

  var isRight = btn.getAttribute('data-right') === '1';
  var allBtns = document.querySelectorAll('.answer-btn');

  // Lock all buttons
  allBtns.forEach(function(b) {
    b.classList.add('locked');
    if (b.getAttribute('data-right') === '1') {
      b.classList.add('correct');
    }
    if (b === btn && !isRight) {
      b.classList.add('wrong');
    }
  });

  if (isRight) score++;
  document.getElementById('score-val').textContent = score + '/6';

  // Show feedback
  var fb = document.getElementById('feedback');
  var verdictClass = isRight ? 'grn' : 'rd';
  var verdictText = isRight
    ? '&#10003; Correct! +1'
    : '&#10007; Wrong — you played ' + btn.getAttribute('data-move') + '. The right move was ' + q.right + '.';
  var tipClass = isRight ? 'tip green' : 'tip red';

  fb.innerHTML =
    '<div class="result-verdict ' + verdictClass + '">' + verdictText + '</div>' +
    '<div class="' + tipClass + '"><strong>Why?</strong> ' + q.explanation + '</div>';
  fb.className = '';

  document.getElementById('next-wrap').className = '';
}

function advance() {
  current++;
  if (current >= quizzes.length) {
    showEnd();
  } else {
    render();
  }
}

function showEnd() {
  document.getElementById('quiz-area').className = 'hidden';
  document.getElementById('score-bar').className = 'stats hidden';
  var end = document.getElementById('end-screen');
  end.className = 'end-screen';

  document.getElementById('end-score').textContent = score;

  var msg = '';
  if (score === 6) msg = 'Perfect! You\'ve learned from every mistake.';
  else if (score >= 4) msg = 'Great! Most patterns are clicking.';
  else msg = 'Keep studying — review the chapters below.';
  document.getElementById('end-msg').textContent = msg;

  var statsHtml =
    '<div class="stat"><div class="label">Final Score</div><div class="val grn">' + score + '/6</div></div>' +
    '<div class="stat"><div class="label">Accuracy</div><div class="val">' + Math.round(score / 6 * 100) + '%</div></div>' +
    '<div class="stat"><div class="label">Blunders Avoided</div><div class="val">' + score + '</div></div>';
  document.getElementById('end-stats').innerHTML = statsHtml;
}

function restart() {
  current = 0;
  score = 0;
  document.getElementById('quiz-area').className = '';
  document.getElementById('score-bar').className = 'stats';
  document.getElementById('end-screen').className = 'end-screen hidden';
  quizzes = shuffle(quizzes);
  render();
}

document.getElementById('next-btn').addEventListener('click', advance);
document.getElementById('retry-btn').addEventListener('click', restart);

// Start
quizzes = shuffle(quizzes);
render();

})();
</script>
<script src="gamification.js"></script>
</body>
</html>
